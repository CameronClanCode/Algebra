<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Algebra calculator</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: row;
        align-items: center;
        margin-top: 50px;
        justify-content: center;
        display: flex;
        flex-wrap: wrap; /* Allows items to move to new lines */
        justify-content: center;
        align-items: center;
        gap: 10px; /* Modern way to add spacing between all items */
      }

      input {
        padding: 10px;
        margin-left: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
        background-color: #4285f4;
        color: white;
        border: none;
        border-radius: 4px;
      }
      #output {
        margin-top: 20px;
        font-weight: bold;
        color: #333;
      }

      .break {
        flex-basis: 100%; /* Forces this item to take the whole row */
        height: 0; /* Makes it invisible */
      }

      .score {
        flex-basis: 100%; /* Forces this item to take the whole row */
      }

      .flash-green {
        animation: flash-green 0.6s infinite alternate;
      }

      .flash-red {
        animation: flash-red 0.6s infinite alternate;
      }

      @keyframes flash-green {
        from {
          background-color: #00ff00;
        }
        to {
          background-color: #009900;
        }
      }

      @keyframes flash-red {
        from {
          background-color: #ff0000;
        }
        to {
          background-color: #990000;
        }
      }

      #winOverlay {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: none;
        z-index: 1000;
        pointer-events: none;
      }

      #imageGif {
        max-width: 100vw;
        max-height: 100vh;
        animation: bounce 0.6s infinite;
      }

      @keyframes bounce {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-40px);
        }
        100% {
          transform: translateY(0);
        }
      }
      #imageConfetti {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
        overflow: visible; /* allow confetti to fall outside the container */
      }
      .confettiImage {
        position: absolute;
        width: 10px; /* small confetti */
        animation:
          fall 4s linear forwards,
          spin 2s linear infinite;
      }

      @keyframes fall {
        0% {
          top: -10%;
        } /* start above screen */
        100% {
          top: 110%;
        } /* fall past bottom of screen */
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes bounceConfetti {
        0% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-15px); /* small bounce up */
        }
        50% {
          transform: translateY(0);
        }
        70% {
          transform: translateY(-7px); /* smaller second bounce */
        }
        100% {
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="winOverlay">
      <img src="llama.gif" id="llamaGif" style="display: none" />
      <img src="axolotl.gif" id="axolotlGif" style="display: none" />
    </div>
    <div id="imageConfetti"></div>
    <div class="score" id="score">Score:0</div>
    <audio id="correctSound" src="horray.mp3"></audio>
    <audio id="wrongSound" src="boo.mp3"></audio>
    <div class="break"></div>

    <input type="text" id="sum1" placeholder="Type something..." />

    <select id="operator">
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">*</option>
      <option value="/">/</option>
      <option value="A">A</option>
    </select>

    <input type="text" id="sum2" placeholder="Type something..." />

    &nbsp; = &nbsp;
    <input type="text" id="sum_answer" placeholder="Type something..." />

    <div class="break"></div>

    &nbsp; A = &nbsp;
    <input type="text" id="answer" placeholder="Type your answer" />

    <div class="break"></div>
    <button onclick="displayValue()">answer</button>
    <div class="break"></div>

    <div id="output"></div>
    <div class="break"></div>
    <button onclick="reset()">reset</button>
    <div class="break"></div>

    <script>
      // Get current URL
      const url = new URL(window.location.href);

      // Check for a parameter
      const paramValue = url.searchParams.get("param");

      let score = 0;
      let elementId = 0;

      function showImage(imageType) {
        const overlay = document.getElementById("winOverlay");
        const images = overlay.querySelectorAll("img");

        images.forEach((img) => (img.style.display = "none"));

        let elementId = "";
        if (imageType === "llama") {
          elementId = "llamaGif";
        } else if (imageType === "axolotl") {
          elementId = "axolotlGif";
        }

        const imageYay = document.getElementById(elementId);
        if (!imageYay) return;

        imageYay.style.display = "block";

        // --- Scaling logic ---
        let baseWidth, maxWidth, scaleFactor;

        if (imageType === "llama") {
          baseWidth = 240; // starting width in px
          maxWidth = 440; // max width
          scaleFactor = 1.3; // exponential-ish factor
          // Llama only shows 5 times: we map 1–5 to width
          let timesShown = Math.min(Math.floor(score / 5), 5);
          imageYay.style.width =
            Math.min(baseWidth * Math.pow(scaleFactor, timesShown), maxWidth) +
            "px";
        } else if (imageType === "axolotl") {
          baseWidth = 300; // starting width in px
          maxWidth = 500; // max width
          scaleFactor = 1.2; // gentler exponential
          let timesShown = Math.floor((score - 75) / 5); // axolotl shows 75+
          if (timesShown < 0) timesShown = 0;
          imageYay.style.width =
            Math.min(baseWidth * Math.pow(scaleFactor, timesShown), maxWidth) +
            "px";
        }

        overlay.style.display = "block";

        // Hide after a few seconds (adjust if you want)
        setTimeout(() => {
          imageYay.style.display = "none";
        }, 3000);
      }
      function showImageConfetti(imageType) {
        const container = document.getElementById("imageConfetti");

        // Determine a "main image size" for scaling confetti
        let mainImageWidth = imageType === "llama" ? 240 : 300; // same as baseWidth
        let confettiMin = mainImageWidth / 3; // min width ~1/3 of main image
        let confettiMax = mainImageWidth / 2; // max width ~1/2 of main image

        for (let i = 0; i < 20; i++) {
          const yayImage = document.createElement("img");
          yayImage.src = imageType + ".gif";
          yayImage.className = "confettiImage";

          // Random horizontal position
          yayImage.style.left = Math.random() * 100 + "vw";

          // Random size scaled relative to main image
          const size =
            confettiMin + Math.random() * (confettiMax - confettiMin);
          yayImage.style.width = size + "px";

          // Random starting height above the screen
          yayImage.style.top = -Math.random() * 100 + "px";

          // Random animation delay
          yayImage.style.animationDelay = Math.random() * 2 + "s";

          // Append to container
          container.appendChild(yayImage);

          // Let it fall
          yayImage.style.animation = `fall 4s linear forwards, spin ${2 + Math.random() * 2}s linear infinite`;

          // Remove after falling
          setTimeout(() => {
            yayImage.remove();
          }, 4000); // duration of fall
        }
      }

      function addPoint() {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        const sound = document.getElementById("correctSound");
        sound.currentTime = 0;
        sound.play();

        if (paramValue === "llama_" && score % 5 === 0 && score > 0) {
          if (score >= 75) {
            // 75+ → axolotl confetti only
            showImageConfetti("axolotl");
          } else if (score >= 50) {
            // 50–70 → axolotl image only
            showImage("axolotl");
          } else if (score >= 25) {
            // 25–45 → llama confetti only
            showImageConfetti("llama");
          } else if (score >= 4) {
            // 5–20 → llama image only
            showImage("llama");
          }
        }
      }

      function deletePoint() {
        score--;
        document.getElementById("score").innerText = "Score: " + score;
        const sound = document.getElementById("wrongSound");
        sound.currentTime = 0;
        sound.play();
      }

      function reset() {
        document.body.classList.remove("flash-green", "flash-red");
        document.getElementById("output").innerText = "";
        document.getElementById("operator").value = "+";
        document.getElementById("sum1").value = "";
        document.getElementById("sum2").value = "";
        document.getElementById("sum_answer").value = "";
        document.getElementById("answer").value = "";
      }

      function checkTheSum(sum1, op, sum2, sum_answer) {
        // 1. Get the numbers and the operator
        const num1 = parseFloat(sum1);
        const num2 = parseFloat(sum2);
        const num_answer = parseFloat(sum_answer);

        let result;

        // 2. Decide which operation to do based on the operator string
        if (op === "+") {
          result = num1 + num2;
        } else if (op === "-") {
          result = num1 - num2;
        } else if (op === "*") {
          result = num1 * num2;
        } else if (op === "/") {
          result = num2 !== 0 ? num1 / num2 : "Cannot divide by zero";
        }

        if (parseFloat(num_answer) == result) {
          return "Correct!";
        } else {
          return "Wrong!";
        }
      }

      function displayValue() {
        // Get the values from the input fields
        var val = document.getElementById("answer").value;
        var sum1 = document.getElementById("sum1").value;
        var sum2 = document.getElementById("sum2").value;
        var sum_answer = document.getElementById("sum_answer").value;

        var op = document.getElementById("operator").value;
        var answer = ""; // Initialize the variable

        if (op == "A") {
          // If operator is A, use the calculate function
          op = document.getElementById("answer").value;
          answer = checkTheSum(sum1, op, sum2, sum_answer);
        } else if (sum1.toUpperCase() == "A") {
          // Case where sum1 is A

          sum1 = document.getElementById("answer").value;
          answer = checkTheSum(sum1, op, sum2, sum_answer);
        } else if (sum2.toUpperCase() == "A") {
          // Case where sum2 is A
          sum2 = document.getElementById("answer").value;
          answer = checkTheSum(sum1, op, sum2, sum_answer);
        } else if (sum_answer.toUpperCase() == "A") {
          // Case where sum_answer is A
          sum_answer = document.getElementById("answer").value;
          answer = checkTheSum(sum1, op, sum2, sum_answer);
        } else {
          // Case where sum is complete
          answer = checkTheSum(sum1, op, sum2, sum_answer);
        }

        // Display it in the output div

        document.body.classList.remove("flash-green", "flash-red");

        document.getElementById("output").innerText = answer;
        if (answer.toLowerCase().includes("correct")) {
          document.body.classList.add("flash-green");
          addPoint();
        } else if (answer.toLowerCase().includes("wrong")) {
          document.body.classList.add("flash-red");
          deletePoint();
        }
      }
    </script>
  </body>
</html>
