<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Algebra calculator</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: row;
        align-items: center;
        margin-top: 50px;
        justify-content: center;
        display: flex;
        flex-wrap: wrap; /* Allows items to move to new lines */
        justify-content: center;
        align-items: center;
        gap: 10px; /* Modern way to add spacing between all items */
      }

      input {
        padding: 10px;
        margin-left: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
        background-color: #4285f4;
        color: white;
        border: none;
        border-radius: 4px;
      }
      #output {
        margin-top: 20px;
        font-weight: bold;
        color: #333;
      }

      .break {
        flex-basis: 100%; /* Forces this item to take the whole row */
        height: 0; /* Makes it invisible */
      }

.score {
        flex-basis: 100%; /* Forces this item to take the whole row */
      }


.flash-green {
  animation: flash-green 0.6s infinite alternate;
}

.flash-red {
  animation: flash-red 0.6s infinite alternate;
}

@keyframes flash-green {
  from { background-color: #00ff00; }
  to   { background-color: #009900; }
}

@keyframes flash-red {
  from { background-color: #ff0000; }
  to   { background-color: #990000; }
}

#winOverlay{
  position:fixed;
  bottom:20px;
  right:20px;
  display:none;
  z-index:1000;
  pointer-events:none; 
}

#llamaGif{
  max-width:100vw;
  max-height:100vh;
  animation: bounce 0.6s infinite;
}

@keyframes bounce{
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-40px); }
  100% { transform: translateY(0); }
}
#llamaConfetti{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:999;
}

.confettiLlama{
  position:absolute;
  width:60px;
  animation: fall 4s linear forwards, spin 2s linear infinite;
}

@keyframes fall{
  from { transform: translateY(-100px); }
  to   { transform: translateY(110vh); }
}

@keyframes spin{
  from { rotate:0deg; }
  to   { rotate:360deg; }
}

    </style>
  </head>
   <body>
<div id="winOverlay">
  <img src="llama.gif" id="llamaGif">
</div>
<div id="llamaConfetti"></div>
   <div class="score" id="score">Score:0</div>
<audio id="correctSound" src="horray.mp3"></audio>
<audio id="wrongSound" src="boo.mp3"></audio>
<div class="break"></div>


                                             
    <input type="text" id="sum1" placeholder="Type something..." />

    <select id="operator">
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">*</option>
      <option value="/">/</option>
      <option value="A">A</option>
    </select>

    <input type="text" id="sum2" placeholder="Type something..." />

    &nbsp; = &nbsp;
    <input type="text" id="sum_answer" placeholder="Type something..." />

    <div class="break"></div>

    &nbsp; A = &nbsp;
    <input type="text" id="answer" placeholder="Type your answer" />

    <div class="break"></div>
    <button onclick="displayValue()">answer</button>
    <div class="break"></div>

    <div id="output"></div>
             <div class="break"></div>
    <button onclick="reset()">reset</button>
    <div class="break"></div>

    <script>

let score = 0;

function showLlama(){

  const overlay = document.getElementById("winOverlay");
  const llama = document.getElementById("llamaGif");

  let level = Math.floor(score / 10);

  // scale from 0.25 to 1.0
  let scale = 0.25 + (level * 0.1);

  if (scale > 1) scale = 1;

  llama.style.width = (scale * 100) + "vw";

  overlay.style.display = "block";

  // show longer each time (max 10 seconds)
  let time = 3000 + level * 1000;
  if (time > 10000) time = 10000;

  setTimeout(function(){
    overlay.style.display = "none";
  }, time);
}

function llamaConfetti(){

  const container = document.getElementById("llamaConfetti");

  for(let i = 0; i < 20; i++){

    const llama = document.createElement("img");

    llama.src = "llama.gif";
    llama.className = "confettiLlama";

    llama.style.left = Math.random() * 100 + "vw";
    llama.style.animationDelay = Math.random() * 2 + "s";

    container.appendChild(llama);

    setTimeout(() => {
      llama.remove();
    },4000);

  }
}

function addPoint() {
  score++;
  document.getElementById("score").innerText = "Score: "+ score;
const sound = document.getElementById("correctSound");
  sound.currentTime = 0;
  sound.play();

 if ((score % 10 === 0) && (score > 0)) {
   showLlama();
  }

if (score >= 50 && score % 10 === 0) {
  llamaConfetti();
}
}

function deletePoint() {
  score--;
  document.getElementById("score").innerText = "Score: "+ score;
const sound = document.getElementById("wrongSound");
  sound.currentTime = 0;
  sound.play();
}


      function reset() {
document.body.classList.remove("flash-green", "flash-red");
 document.getElementById("output").innerText = "";
document.getElementById("operator").value = "+";
document.getElementById("sum1").value = "";
document.getElementById("sum2").value = "";
document.getElementById("sum_answer").value = "";
document.getElementById("answer").value = "";
}




      function checkTheSum(sum1, op, sum2, sum_answer) {
        // 1. Get the numbers and the operator
        const num1 = parseFloat(sum1);
        const num2 = parseFloat(sum2);
        const num_answer = parseFloat(sum_answer);

        let result;

        // 2. Decide which operation to do based on the operator string
        if (op === "+") {
          result = num1 + num2;
        } else if (op === "-") {
          result = num1 - num2;
        } else if (op === "*") {
          result = num1 * num2;
        } else if (op === "/") {
          result = num2 !== 0 ? num1 / num2 : "Cannot divide by zero";
        }

        if (parseFloat(num_answer) == result) {
          return "Correct!";
        } else {
          return "Wrong!";
        }
      }


      function displayValue() {
        // Get the values from the input fields
        var val = document.getElementById("answer").value;
        var sum1 = document.getElementById("sum1").value;
        var sum2 = document.getElementById("sum2").value;
        var sum_answer = document.getElementById("sum_answer").value;

        var op = document.getElementById("operator").value;
        var answer = ""; // Initialize the variable

        if (op == "A") {
          // If operator is A, use the calculate function
          op = document.getElementById("answer").value;
          answer =
            checkTheSum(sum1, op, sum2, sum_answer);
        } else if (sum1.toUpperCase() == "A") {
          // Case where sum1 is A
           
sum1 = document.getElementById("answer").value;
          answer =
            checkTheSum(sum1, op, sum2, sum_answer);
        } else if (sum2.toUpperCase() == "A"){
          // Case where sum2 is A
          sum2 = document.getElementById("answer").value;
          answer =
            checkTheSum(sum1, op, sum2, sum_answer);
        } else if (sum_answer.toUpperCase() == "A"){
          // Case where sum_answer is A
         sum_answer = document.getElementById("answer").value;
          answer =
             checkTheSum(sum1, op, sum2, sum_answer);
        } else {
          // Case where sum is complete
          answer =
             checkTheSum(sum1, op, sum2, sum_answer);
        }

        // Display it in the output div

     document.body.classList.remove("flash-green", "flash-red");

        document.getElementById("output").innerText = answer;
      if (answer.toLowerCase().includes("correct")) {

     document.body.classList.add("flash-green");
     addPoint()

     }
     else if (answer.toLowerCase().includes("wrong")) {
       document.body.classList.add("flash-red");
       deletePoint()

}
}
    </script>
  </body>
</html>
